name: WGC Design System Pipeline

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  # --- ANDROID (Gera .AAR) ---
  build-android:
    name: Android Build (AAR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🤖 Build Modules
        run: |
          cd core_ds && flutter pub get && flutter build aar --release && cd ..
          cd components && flutter pub get && flutter build aar --release && cd ..
          cd templates && flutter pub get && flutter build aar --release && cd ..

      - name: ⬆️ Upload AARs
        uses: actions/upload-artifact@v4
        with:
          name: android-aar-packages
          path: "**/build/outputs/aar/*.aar"

  # --- WEB (Gera Index.html e JS) ---
  build-web:
    name: Web Build (HTML/JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🌐 Build Modules
        run: |
          cd core_ds && flutter pub get && flutter build web --release && cd ..
          cd components && flutter pub get && flutter build web --release && cd ..
          cd templates && flutter pub get && flutter build web --release && cd ..

      - name: ⬆️ Upload Web Files
        uses: actions/upload-artifact@v4
        with:
          name: web-builds
          path: "**/build/web/"

  # --- IOS (Gera Build de validação) ---
  build-ios:
    name: iOS Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🍏 Build Modules
        run: |
          cd core_ds && flutter pub get && flutter build ios --release --no-codesign && cd ..
          cd components && flutter pub get && flutter build ios --release --no-codesign && cd ..
          cd templates && flutter pub get && flutter build ios --release --no-codesign && cd ..

  # --- WINDOWS (Gera .EXE) ---
  build-windows:
    name: Windows Build (EXE)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🪟 Build Modules
        run: |
          cd core_ds; flutter pub get; flutter build windows --release; cd ..
          cd components; flutter pub get; flutter build windows --release; cd ..
          cd templates; flutter pub get; flutter build windows --release; cd ..

      - name: ⬆️ Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-executables
          path: "**/build/windows/runner/Release/"

  # --- MACOS (Gera .APP) ---
  build-macos:
    name: macOS Build (APP)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 💻 Build Modules
        run: |
          cd core_ds && flutter pub get && flutter build macos --release && cd ..
          cd components && flutter pub get && flutter build macos --release && cd ..
          cd templates && flutter pub get && flutter build macos --release && cd ..

      - name: ⬆️ Upload macOS Apps
        uses: actions/upload-artifact@v4
        with:
          name: macos-apps
          path: "**/build/macos/Build/Products/Release/*.app"

  # --- LINUX (Gera Binário/Bundle) ---
  build-linux:
    name: Linux Build (Bundle)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: 🛠️ Deps
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: 🐧 Build Modules
        run: |
          cd core_ds && flutter pub get && flutter build linux --release && cd ..
          cd components && flutter pub get && flutter build linux --release && cd ..
          cd templates && flutter pub get && flutter build linux --release && cd ..

      - name: ⬆️ Upload Linux Bundles
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          path: "**/build/linux/x64/release/bundle/"