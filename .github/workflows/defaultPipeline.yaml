name: Flutter Multi-Platform Build & Publish

on:
  push:
    branches:
      - "master"
  pull_request:
    branches:
      - "master"

jobs:
  detect_changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed_modules.outputs.any_changed }}
      changed_files: ${{ steps.changed_modules.outputs.all_changed_files }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed modules
        id: changed_modules
        uses: tj-actions/changed-files@v47
        with:
          files: |
            components/**
            core_ds/**
            templates/**
            example/**

  # JOB: Android (ubuntu)
  android_build:
    name: Android — build & test per module
    runs-on: ubuntu-latest
    needs: detect_changes
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: core_ds — build android
        run: cd core_ds && flutter pub get && flutter analyze && cd ..

      - name: components — build android
        run: cd components && flutter pub get && flutter analyze cd ..

      - name: templates — build android
        run: cd templates && flutter pub get && flutter analyze cd ..

  # JOB: iOS (macos)
  ios_build:
    name: iOS — build & test per module
    runs-on: macos-latest
    needs: detect_changes
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: core_ds — build ios
        run: cd core_ds && flutter pub get && flutter build ios --release --no-codesign

      - name: components — build ios
        run: cd components && flutter pub get && flutter build ios --release --no-codesign

      - name: templates — build ios
        run: cd templates && flutter pub get && flutter build ios --release --no-codesign

  # JOB: Web (ubuntu)
  web_build:
    name: Web — build & test per module
    runs-on: ubuntu-latest
    needs: detect_changes
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: core_ds — build web
        run: cd core_ds && flutter pub get && flutter build web --release

      - name: components — build web
        run: cd components && flutter pub get && flutter build web --release

      - name: templates — build web
        run: cd templates && flutter pub get && flutter build web --release

  # JOB: Linux (ubuntu)
  linux_build:
    name: Linux — build & test per module
    runs-on: ubuntu-latest
    needs: detect_changes
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: Install Linux Toolchain
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: core_ds — build linux
        run: cd core_ds && flutter pub get && flutter build linux --release

      - name: components — build linux
        run: cd components && flutter pub get && flutter build linux --release

      - name: templates — build linux
        run: cd templates && flutter pub get && flutter build linux --release

  # JOB: macOS (macos)
  macos_build:
    name: macOS — build & test per module
    runs-on: macos-latest
    needs: detect_changes
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: core_ds — build macos
        run: cd core_ds && flutter pub get && flutter build macos --release

      - name: components — build macos
        run: cd components && flutter pub get && flutter build macos --release

      - name: templates — build macos
        run: cd templates && flutter pub get && flutter build macos --release

  # JOB: Windows (windows)
  windows_build:
    name: Windows — build & test per module
    runs-on: windows-latest
    needs: detect_changes
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

      - name: core_ds — build windows
        run: |
          cd core_ds
          flutter pub get
          flutter build windows --release

      - name: components — build windows
        run: |
          cd components
          flutter pub get
          flutter build windows --release

      - name: templates — build windows
        run: |
          cd templates
          flutter pub get
          flutter build windows --release

  # JOB: Pack & Publish
  pack_and_publish:
    name: Pack & Publish packages (per-module steps)
    runs-on: ubuntu-latest
    needs: detect_changes
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Flutter / Dart
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Prepare artifacts dir
        run: mkdir -p artifacts

      - name: components — pack
        if: ${{ needs.detect_changes.outputs.any_changed == 'true' && contains(needs.detect_changes.outputs.changed_files, 'components/') }}
        run: cd components && flutter pub get && dart pub pack && mv *.tar.gz ../artifacts/ || true

      - name: core_ds — pack
        if: ${{ needs.detect_changes.outputs.any_changed == 'true' && contains(needs.detect_changes.outputs.changed_files, 'core_ds/') }}
        run: cd core_ds && flutter pub get && dart pub pack && mv *.tar.gz ../artifacts/ || true

      - name: templates — pack
        if: ${{ needs.detect_changes.outputs.any_changed == 'true' && contains(needs.detect_changes.outputs.changed_files, 'templates/') }}
        run: cd templates && flutter pub get && dart pub pack && mv *.tar.gz ../artifacts/ || true

      - name: Upload packaged artifacts
        if: ${{ needs.detect_changes.outputs.any_changed == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: flutter-packages
          path: artifacts/*.tar.gz